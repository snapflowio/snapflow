services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snapflow
    restart: unless-stopped
    ports:
      - "${PORT:-8081}:8081"
    environment:
      PORT: 8081
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      DEFAULT_IMAGE: ${DEFAULT_IMAGE:-snapflowio/snapflow:0.1.3}

      # URLs
      API_URL: ${API_URL:-http://localhost:8081}

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}

      # OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_SUCCESS_URL: ${POLAR_SUCCESS_URL:-}

      # Proxy
      PROXY_DOMAIN: ${PROXY_DOMAIN:-proxy.localhost:4000}
      PROXY_PROTOCOL: ${PROXY_PROTOCOL:-http}
      PROXY_API_KEY: ${PROXY_API_KEY:-super_secret_key}

      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}

      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Docker Registry
      TRANSIENT_REGISTRY_URL: ${TRANSIENT_REGISTRY_URL}
      TRANSIENT_REGISTRY_ADMIN: ${TRANSIENT_REGISTRY_ADMIN:-snapflow}
      TRANSIENT_REGISTRY_PASSWORD: ${TRANSIENT_REGISTRY_PASSWORD:-registry_pass}
      TRANSIENT_REGISTRY_PROJECT_ID: ${TRANSIENT_REGISTRY_PROJECT_ID:-snapflow}
      INTERNAL_REGISTRY_URL: ${INTERNAL_REGISTRY_URL}
      INTERNAL_REGISTRY_ADMIN: ${INTERNAL_REGISTRY_ADMIN:-snapflow}
      INTERNAL_REGISTRY_PASSWORD: ${INTERNAL_REGISTRY_PASSWORD:-registry_pass}
      INTERNAL_REGISTRY_PROJECT_ID: ${INTERNAL_REGISTRY_PROJECT_ID:-snapflow}

      # SMTP
      SMTP_HOST: ${SMTP_HOST:-maildev}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_EMAIL_FROM: ${SMTP_EMAIL_FROM:-noreply@snapflow.local}

      # Object Storage
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION:-auto}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_DEFAULT_BUCKET: ${R2_DEFAULT_BUCKET:-snapflow}
      R2_PRESIGNED_URL_EXPIRY: ${R2_PRESIGNED_URL_EXPIRY:-3600}

      # Sandbox
      MAX_AUTO_ARCHIVE_INTERVAL: ${MAX_AUTO_ARCHIVE_INTERVAL:-43200}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_CONSOLE_DISABLED: ${LOG_CONSOLE_DISABLED:-false}
      LOG_REQUESTS_ENABLED: ${LOG_REQUESTS_ENABLED:-false}

      # Default Executor
      DEFAULT_EXECUTOR_DOMAIN: ${DEFAULT_EXECUTOR_DOMAIN:-}
      DEFAULT_EXECUTOR_API_KEY: ${DEFAULT_EXECUTOR_API_KEY:-}
      DEFAULT_EXECUTOR_PROXY_URL: ${DEFAULT_EXECUTOR_PROXY_URL:-}
      DEFAULT_EXECUTOR_API_URL: ${DEFAULT_EXECUTOR_API_URL:-}
      DEFAULT_EXECUTOR_CPU: ${DEFAULT_EXECUTOR_CPU:-8}
      DEFAULT_EXECUTOR_MEMORY_GIB: ${DEFAULT_EXECUTOR_MEMORY_GIB:-16}
      DEFAULT_EXECUTOR_DISK_GIB: ${DEFAULT_EXECUTOR_DISK_GIB:-100}
      DEFAULT_EXECUTOR_GPU: ${DEFAULT_EXECUTOR_GPU:-0}
      DEFAULT_EXECUTOR_GPU_TYPE: ${DEFAULT_EXECUTOR_GPU_TYPE:-none}
      DEFAULT_EXECUTOR_CLASS: ${DEFAULT_EXECUTOR_CLASS:-small}
      DEFAULT_EXECUTOR_CAPACITY: ${DEFAULT_EXECUTOR_CAPACITY:-2}
      DEFAULT_EXECUTOR_REGION: ${DEFAULT_EXECUTOR_REGION:-us}
      DEFAULT_EXECUTOR_VERSION: ${DEFAULT_EXECUTOR_VERSION:-0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - snapflow

networks:
  snapflow:
    external: true
