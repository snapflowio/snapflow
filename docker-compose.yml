version: '3.8'
services:
  app:
    image: registry:5000/snapflow:latest
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: snapflow_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8081:8081"
    entrypoint:
      - /entrypoint.sh
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - ENVIRONMENT=${ENVIRONMENT}
      - MAINTENANCE_MODE=${MAINTENANCE_MODE}
      - DASHBOARD_URL=${DASHBOARD_URL}
      - DEFAULT_IMAGE=${DEFAULT_IMAGE}
      - PROXY_DOMAIN=${PROXY_DOMAIN}
      - PROXY_PROTOCOL=${PROXY_PROTOCOL}
      - PROXY_API_KEY=${PROXY_API_KEY}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_ISSUER_BASE_URL=${OIDC_ISSUER_BASE_URL}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_FROM_EMAIL_ADDRESS=${SMTP_FROM_EMAIL_ADDRESS}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_DEFAULT_BUCKET=${S3_DEFAULT_BUCKET}
      - MAX_AUTO_ARCHIVE_INTERVAL=${MAX_AUTO_ARCHIVE_INTERVAL}
      - INTERNAL_REGISTRY_URL=${INTERNAL_REGISTRY_URL}
      - INTERNAL_REGISTRY_ADMIN=${INTERNAL_REGISTRY_ADMIN}
      - INTERNAL_REGISTRY_PASSWORD=${INTERNAL_REGISTRY_PASSWORD}
      - INTERNAL_REGISTRY_PROJECT_ID=${INTERNAL_REGISTRY_PROJECT_ID}
      - TRANSIENT_REGISTRY_URL=${TRANSIENT_REGISTRY_URL}
      - TRANSIENT_REGISTRY_ADMIN=${TRANSIENT_REGISTRY_ADMIN}
      - TRANSIENT_REGISTRY_PASSWORD=${TRANSIENT_REGISTRY_PASSWORD}
      - TRANSIENT_REGISTRY_PROJECT_ID=${TRANSIENT_REGISTRY_PROJECT_ID}
      - TERMINAL_BINARY_URL=${TERMINAL_BINARY_URL}
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}

  postgres:
    image: postgres:16
    container_name: snapflow_postgres
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "192.168.1.158:5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: snapflow_redis
    expose:
      - "6379"

  registry:
    image: registry:2
    container_name: snapflow_registry
    restart: always
    expose:
      - "5000"
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry_data:/var/lib/registry

volumes:
  postgres_data:
  registry_data: