version: '3.8'

services:
  app:
    build: .
    container_name: snapflow_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - ENVIRONMENT=${ENVIRONMENT}
      - MAINTENANCE_MODE=${MAINTENANCE_MODE}
      - DASHBOARD_URL=${DASHBOARD_URL}
      - DEFAULT_IMAGE=${DEFAULT_IMAGE}
      - PROXY_DOMAIN=${PROXY_DOMAIN}
      - PROXY_PROTOCOL=${PROXY_PROTOCOL}
      - PROXY_API_KEY=${PROXY_API_KEY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST}
      - DB_HOST=${DB_HOST} 
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_ISSUER_BASE_URL=${OIDC_ISSUER_BASE_URL}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_FROM_EMAIL_ADDRESS=${SMTP_FROM_EMAIL_ADDRESS}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_DEFAULT_BUCKET=${S3_DEFAULT_BUCKET}
      - MAX_AUTO_ARCHIVE_INTERVAL=${MAX_AUTO_ARCHIVE_INTERVAL}
  postgres:
    image: postgres:16
    container_name: snapflow_postgres
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
  redis:
    image: redis:latest
    container_name: snapflow_redis
    expose:
      - "6379"
volumes:
  postgres_data:
