header:
  license:
    spdx-id: AGPL-3.0
    copyright-owner: Snapflow
    software-name: Snapflow
    content: |
      Copyright (c) [year] [owner]. All rights reserved.

      [software-name] is licensed under the GNU Affero General Public License v3.0.
      You may obtain a copy of the license at https://www.gnu.org/licenses/agpl-3.0.html

      SPDX-License-Identifier: AGPL-3.0
    pattern: Copyright \(c\) \d{4}(-\d{4})? Snapflow

  paths:
    - '**/*.rs'
    - '**/*.ts'
    - '**/*.tsx'
    - '**/*.js'
    - '**/*.sh'

  paths-ignore:
    - 'clients/**'
    - 'sdk/**'
    - 'docs/**'
    - 'node_modules/**'
    - '**/node_modules/**'
    - 'dist/**'
    - 'target/**'

  license-location-threshold: 80
  comment: on-failure
