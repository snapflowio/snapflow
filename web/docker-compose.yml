version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WEBSITE_URL: ${VITE_WEBSITE_URL}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST}
        VITE_SHOW_ENTERPRISE: ${VITE_SHOW_ENTERPRISE}
        VITE_PROXY_TEMPLATE_URL: ${VITE_PROXY_TEMPLATE_URL}
    container_name: snapflow-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - snapflow

networks:
  snapflow:
    external: true
