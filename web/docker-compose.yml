version: "3.8"

services:
  web:
    image: snapflowio/web:latest
    container_name: snapflow-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - snapflow

networks:
  snapflow:
    external: true
