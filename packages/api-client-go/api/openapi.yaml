components:
  schemas:
    User:
      example:
        name: name
        id: id
        email: email
      properties:
        id:
          description: User ID
          type: string
        name:
          description: User name
          type: string
        email:
          description: User email
          type: string
      required:
      - email
      - id
      - name
      type: object
    CreateOrganizationQuota:
      example:
        totalCpuQuota: 0.8008281904610115
        maxCpuPerSandbox: 5.962133916683182
        imageQuota: 7.061401241503109
        maxDiskPerSandbox: 2.3021358869347655
        maxMemoryPerSandbox: 5.637376656633329
        maxImageSize: 9.301444243932576
        totalMemoryQuota: 6.027456183070403
        bucketQuota: 3.616076749251911
        totalDiskQuota: 1.4658129805029452
      properties:
        totalCpuQuota:
          type: number
        totalMemoryQuota:
          type: number
        totalDiskQuota:
          type: number
        maxCpuPerSandbox:
          type: number
        maxMemoryPerSandbox:
          type: number
        maxDiskPerSandbox:
          type: number
        imageQuota:
          type: number
        maxImageSize:
          type: number
        bucketQuota:
          type: number
      type: object
    CreateUser:
      example:
        emailVerified: true
        role: admin
        name: name
        id: id
        personalOrganizationQuota:
          totalCpuQuota: 0.8008281904610115
          maxCpuPerSandbox: 5.962133916683182
          imageQuota: 7.061401241503109
          maxDiskPerSandbox: 2.3021358869347655
          maxMemoryPerSandbox: 5.637376656633329
          maxImageSize: 9.301444243932576
          totalMemoryQuota: 6.027456183070403
          bucketQuota: 3.616076749251911
          totalDiskQuota: 1.4658129805029452
        email: email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        role:
          enum:
          - admin
          - user
          type: string
        personalOrganizationQuota:
          $ref: '#/components/schemas/CreateOrganizationQuota'
      required:
      - id
      - name
      type: object
    CreateApiKey:
      example:
        permissions:
        - write:registries
        - write:registries
        name: Test API Key
        expiresAt: 2000-01-23T04:56:07.000+00:00
      properties:
        name:
          description: The name of the API key
          example: Test API Key
          type: string
        permissions:
          description: The list of organization resource permissions assigned to the
            API key
          items:
            enum:
            - write:registries
            - delete:registries
            - write:images
            - delete:images
            - write:sandboxes
            - delete:sandboxes
            - read:buckets
            - write:buckets
            - delete:buckets
            type: string
          type: array
        expiresAt:
          description: When the API key is set to expire
          format: date-time
          nullable: true
          type: string
      required:
      - name
      - permissions
      type: object
    ApiKeyResponse:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        permissions:
        - write:registries
        - write:registries
        name: Test API Key
        value: snapflow_1234567890abcdef
        expiresAt: 2000-01-23T04:56:07.000+00:00
      properties:
        name:
          description: The name of the API key
          example: Test API Key
          type: string
        value:
          description: The value of the API key
          example: snapflow_1234567890abcdef
          type: string
        permissions:
          description: List of permissions given to the API key
          items:
            enum:
            - write:registries
            - delete:registries
            - write:images
            - delete:images
            - write:sandboxes
            - delete:sandboxes
            - read:buckets
            - write:buckets
            - delete:buckets
            type: string
          type: array
        createdAt:
          description: When the API key was made
          format: date-time
          type: string
        expiresAt:
          description: When the API key is set to expire
          format: date-time
          nullable: true
          type: string
      required:
      - createdAt
      - expiresAt
      - name
      - permissions
      - value
      type: object
    ApiKeyList:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        lastUsedAt: 2000-01-23T04:56:07.000+00:00
        permissions:
        - write:registries
        - write:registries
        name: Test API Key
        value: snapflow_************************
        expiresAt: 2000-01-23T04:56:07.000+00:00
      properties:
        name:
          description: The name of the API key
          example: Test API Key
          type: string
        value:
          description: The hidden API key value
          example: snapflow_************************
          type: string
        permissions:
          description: List of permissions given to the API key
          items:
            enum:
            - write:registries
            - delete:registries
            - write:images
            - delete:images
            - write:sandboxes
            - delete:sandboxes
            - read:buckets
            - write:buckets
            - delete:buckets
            type: string
          type: array
        createdAt:
          description: When the API key was made
          format: date-time
          type: string
        expiresAt:
          description: When the API key is set to expire
          format: date-time
          nullable: true
          type: string
        lastUsedAt:
          description: When the latest request was made using the API key
          format: date-time
          nullable: true
          type: string
      required:
      - createdAt
      - expiresAt
      - lastUsedAt
      - name
      - permissions
      - value
      type: object
    OrganizationRole:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        permissions:
        - write:registries
        - write:registries
        name: name
        isGlobal: true
        description: description
        id: id
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: Role ID
          type: string
        name:
          description: Role name
          type: string
        description:
          description: Role description
          type: string
        permissions:
          description: Roles assigned to the user
          items:
            enum:
            - write:registries
            - delete:registries
            - write:images
            - delete:images
            - write:sandboxes
            - delete:sandboxes
            - read:buckets
            - write:buckets
            - delete:buckets
            type: string
          type: array
        isGlobal:
          description: Global role flag
          type: boolean
        createdAt:
          description: Creation timestamp
          format: date-time
          type: string
        updatedAt:
          description: Last update timestamp
          format: date-time
          type: string
      required:
      - createdAt
      - description
      - id
      - isGlobal
      - name
      - permissions
      - updatedAt
      type: object
    OrganizationInvitation:
      example:
        organizationId: organizationId
        createdAt: 2000-01-23T04:56:07.000+00:00
        invitedBy: invitedBy
        role: owner
        organizationName: organizationName
        assignedRoles:
        - createdAt: 2000-01-23T04:56:07.000+00:00
          permissions:
          - write:registries
          - write:registries
          name: name
          isGlobal: true
          description: description
          id: id
          updatedAt: 2000-01-23T04:56:07.000+00:00
        - createdAt: 2000-01-23T04:56:07.000+00:00
          permissions:
          - write:registries
          - write:registries
          name: name
          isGlobal: true
          description: description
          id: id
          updatedAt: 2000-01-23T04:56:07.000+00:00
        id: id
        email: email
        expiresAt: 2000-01-23T04:56:07.000+00:00
        status: pending
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: Invitation ID
          type: string
        email:
          description: Email address of the user being invited
          type: string
        invitedBy:
          description: Email address of the inviter
          type: string
        organizationId:
          description: Organization ID
          type: string
        organizationName:
          description: Organization name
          type: string
        expiresAt:
          description: Expiration date of the invitation
          format: date-time
          type: string
        status:
          description: Invitation status
          enum:
          - pending
          - accepted
          - declined
          - cancelled
          type: string
        role:
          description: Member role
          enum:
          - owner
          - member
          type: string
        assignedRoles:
          description: Assigned roles
          items:
            $ref: '#/components/schemas/OrganizationRole'
          type: array
        createdAt:
          description: Creation timestamp
          format: date-time
          type: string
        updatedAt:
          description: Last update timestamp
          format: date-time
          type: string
      required:
