version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: crates/api/Dockerfile
    container_name: snapflow-api
    restart: unless-stopped
    ports:
      - "${PORT:-8081}:8081"
    environment:
      PORT: 8081

      # General
      NODE_ENV: ${NODE_ENV}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE}
      DEFAULT_IMAGE: ${DEFAULT_IMAGE}

      # URLs
      API_URL: ${API_URL}
      WEBSITE_URL: ${WEBSITE_URL}
      DASHBOARD_URL: ${DASHBOARD_URL}

      # Auth
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}

      # Polar (billing)
      POLAR_SERVER: ${POLAR_SERVER}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET}
      POLAR_PRODUCT_ID_CREDITS: ${POLAR_PRODUCT_ID_CREDITS}

      # Proxy
      PROXY_DOMAIN: ${PROXY_DOMAIN}
      PROXY_PROTOCOL: ${PROXY_PROTOCOL}
      PROXY_API_KEY: ${PROXY_API_KEY}

      # Transient registry
      TRANSIENT_REGISTRY_URL: ${TRANSIENT_REGISTRY_URL}
      TRANSIENT_REGISTRY_ADMIN: ${TRANSIENT_REGISTRY_ADMIN}
      TRANSIENT_REGISTRY_PASSWORD: ${TRANSIENT_REGISTRY_PASSWORD}
      TRANSIENT_REGISTRY_PROJECT_ID: ${TRANSIENT_REGISTRY_PROJECT_ID}

      # Internal registry
      INTERNAL_REGISTRY_URL: ${INTERNAL_REGISTRY_URL}
      INTERNAL_REGISTRY_ADMIN: ${INTERNAL_REGISTRY_ADMIN}
      INTERNAL_REGISTRY_PASSWORD: ${INTERNAL_REGISTRY_PASSWORD}
      INTERNAL_REGISTRY_PROJECT_ID: ${INTERNAL_REGISTRY_PROJECT_ID}

      # Database
      DATABASE_URL: ${DATABASE_URL}
      DB_LOGGING: ${DB_LOGGING}

      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_EMAIL_FROM: ${SMTP_EMAIL_FROM}

      # R2/S3 storage
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_DEFAULT_BUCKET: ${R2_DEFAULT_BUCKET}
      R2_PRESIGNED_URL_EXPIRY: ${R2_PRESIGNED_URL_EXPIRY}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_CONSOLE_DISABLED: ${LOG_CONSOLE_DISABLED}
      LOG_REQUESTS_ENABLED: ${LOG_REQUESTS_ENABLED}

      # Sandbox limits
      MAX_AUTO_ARCHIVE_INTERVAL: ${MAX_AUTO_ARCHIVE_INTERVAL}

      # Default executor
      DEFAULT_EXECUTOR_DOMAIN: ${DEFAULT_EXECUTOR_DOMAIN}
      DEFAULT_EXECUTOR_API_KEY: ${DEFAULT_EXECUTOR_API_KEY}
      DEFAULT_EXECUTOR_PROXY_URL: ${DEFAULT_EXECUTOR_PROXY_URL}
      DEFAULT_EXECUTOR_API_URL: ${DEFAULT_EXECUTOR_API_URL}
      DEFAULT_EXECUTOR_CPU: ${DEFAULT_EXECUTOR_CPU}
      DEFAULT_EXECUTOR_MEMORY_GIB: ${DEFAULT_EXECUTOR_MEMORY_GIB}
      DEFAULT_EXECUTOR_DISK_GIB: ${DEFAULT_EXECUTOR_DISK_GIB}
      DEFAULT_EXECUTOR_GPU: ${DEFAULT_EXECUTOR_GPU}
      DEFAULT_EXECUTOR_GPU_TYPE: ${DEFAULT_EXECUTOR_GPU_TYPE}
      DEFAULT_EXECUTOR_CLASS: ${DEFAULT_EXECUTOR_CLASS}
      DEFAULT_EXECUTOR_CAPACITY: ${DEFAULT_EXECUTOR_CAPACITY}
      DEFAULT_EXECUTOR_REGION: ${DEFAULT_EXECUTOR_REGION}
      DEFAULT_EXECUTOR_VERSION: ${DEFAULT_EXECUTOR_VERSION}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - snapflow

networks:
  snapflow:
    external: true
