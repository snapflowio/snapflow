# Network
bind 0.0.0.0
protected-mode no
port 6379

# Persistence
save 3600 1
save 300 100

# Persistence - AOF
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Prevent blocking during background saves
no-appendfsync-on-rewrite yes

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Performance
databases 16
slowlog-log-slower-than 10000
slowlog-max-len 128
