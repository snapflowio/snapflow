name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "**/Cargo.toml"
      - "bun.lock"
      - "package.json"
      - "**/package.json"

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Rust Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  bun-audit:
    name: JavaScript Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit
        run: bun pm audit
