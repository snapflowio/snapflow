name: Build & Deploy

on:
  push:
    branches: [canary]

jobs:
  build:
    name: Build & push images
    runs-on: blacksmith-2vcpu-ubuntu-2204

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: snapflowio/api
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Docker metadata for proxy
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: snapflowio/proxy
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Docker metadata for executor
        id: meta-executor
        uses: docker/metadata-action@v5
        with:
          images: snapflowio/executor
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Docker metadata for web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: snapflowio/web
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Build & push proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}

      - name: Build & push executor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/executor/Dockerfile
          push: true
          tags: ${{ steps.meta-executor.outputs.tags }}
          labels: ${{ steps.meta-executor.outputs.labels }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WEBSITE_URL=${{ secrets.VITE_WEBSITE_URL }}
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}
            VITE_POSTHOG_HOST=${{ secrets.VITE_POSTHOG_HOST }}
            VITE_SHOW_ENTERPRISE=${{ secrets.VITE_SHOW_ENTERPRISE }}
            VITE_PROXY_TEMPLATE_URL=${{ secrets.VITE_PROXY_TEMPLATE_URL }}

  deploy:
    name: Trigger Deploy
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: build

    steps:
      - name: Deploy api
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_SERVICE_UUID_API }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Deploy proxy
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_SERVICE_UUID_PROXY }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Deploy executor
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_SERVICE_UUID_EXECUTOR }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Deploy web
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_SERVICE_UUID_WEB }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
