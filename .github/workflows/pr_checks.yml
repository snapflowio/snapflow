name: "[PR] Validate code"

on:
  pull_request:
    branches:
      - canary

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    name: License Header Check
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v6

      - name: Check AGPL-3.0 license headers
        uses: apache/skywalking-eyes/header@main
        with:
          config: .licenserc.yaml
          mode: 'check'

      - name: Check Apache-2.0 license headers
        uses: apache/skywalking-eyes/header@main
        with:
          config: .licenserc-clients.yaml
          mode: 'check'

  lint:
    name: Lint & Format Check
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun lint

      - name: Check Biome formatting
        run: |
          bun format --write=false
          git diff --exit-code || (echo "Code is not formatted! Please run 'bun format' or 'bun lint:fix' and commit" && exit 1)

  rust:
    name: Rust Check
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: useblacksmith/rust-cache@v3

      - name: Clippy
        run: cargo clippy --workspace --exclude snapflow-api-client -- -D warnings
